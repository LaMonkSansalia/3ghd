services:
  studio_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: studio3ghd_app:latest
    container_name: studio3ghd_app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - studio_internal
    depends_on:
      studio_db:
        condition: service_healthy
      studio_redis:
        condition: service_started

  studio_nginx:
    image: nginx:1.27-alpine
    container_name: studio3ghd_nginx
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - studio_internal
    depends_on:
      - studio_app

  studio_db:
    image: mariadb:11.4
    container_name: studio3ghd_db
    ports:
      - "127.0.0.1:3310:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - studio_db_data:/var/lib/mysql
    networks:
      - studio_internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  studio_redis:
    image: redis:7-alpine
    container_name: studio3ghd_redis
    command: redis-server --save "" --appendonly no
    networks:
      - studio_internal

networks:
  studio_internal:
    driver: bridge

volumes:
  studio_db_data:
