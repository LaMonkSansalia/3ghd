# deploy.yml — Studio3GHD CI/CD
# Deploy automatico su VPS 75.119.148.29 al push su main
#
# GitHub Secrets richiesti:
#   VPS_SSH_KEY   — chiave privata SSH (contenuto di ~/.ssh/id_rsa o id_ed25519)
#   VPS_HOST      — IP VPS (75.119.148.29)
#   VPS_USER      — utente SSH (lamonk)

name: Deploy Studio3GHD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy su VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/lamonk/3ghomedesign/studio

            echo "==> git pull"
            git pull origin main

            echo "==> npm build (assets Vite)"
            cd app && npm ci --prefer-offline && npm run build && cd ..

            echo "==> composer install"
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              composer install --no-dev --optimize-autoloader --no-interaction

            echo "==> migrate"
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan migrate --force --no-interaction

            echo "==> cache + optimize"
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan view:cache
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan filament:optimize

            echo "==> queue:restart (graceful)"
            docker compose -f docker-compose.prod.yml exec -T studio_app \
              php artisan queue:restart

            echo "==> Deploy completato."
